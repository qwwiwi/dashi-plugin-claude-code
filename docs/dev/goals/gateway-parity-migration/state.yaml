version: 2

goal:
  title: "Gateway Parity Migration"
  slug: "gateway-parity-migration"
  kind: existing_plan
  tranche: "Map jarvis gateway parity, implement one safe locally tested canary slice, and leave the board active on the next smoke-test or migration task."
  status: active
  intake:
    original_request: "Migrate gateway parity for canary Telegram Claude bot; treat /goat as /goal; compare jarvis gateway; use TDD; commit and push verified progress; leave GoalBuddy active."
    interpreted_outcome: "The qwwiwi canary bot gains verified incremental gateway parity without secret exposure or unsafe live runtime changes."
    input_shape: existing_plan
    audience: "qwwiwi canary Telegram Claude bot operator"
    authority: requested
    proof_type: test
    completion_proof: "Feature parity slices are implemented and verified locally, then smoke-tested safely against canary without production token/config/tmux changes."
    likely_misfire: "Treating parity as a blind full gateway copy or replacing the running canary instead of landing small tested slices."
    blind_spots_considered:
      - "Token secrecy and log redaction."
      - "One-token-one-consumer canary safety."
      - "Live tmux process ownership."
      - "Telegram HTML/Markdown formatting edge cases."
      - "Transcription and memory hook external dependencies."
      - "Webhook injection and produced-file delivery safety."
      - "Claude session persistence through claude --resume."
    existing_plan_facts:
      - "Compare with /Users/jasonqwwen/projects/jarvis-telegram-gateway, especially gateway.py and README."
      - "Cover commands, image/photo, document/video/sticker, voice/audio/video_note transcription, reply/forward context, reactions, callbacks, group routing, Markdown HTML, produced files, webhook injection, memory hooks, streaming/progress, and claude --resume."
      - "First produce a feature parity matrix and choose a safe first canary implementation slice."
      - "Use TDD for implementation."
      - "Do not expose or print tokens."
      - "Do not touch production token files, launchd jobs, gateway config, or production tmux sessions."
      - "Do not replace live tmux orgrimmar-canary without host evidence and tests."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/gateway-parity-migration"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T007

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map qwwiwi canary bot and jarvis gateway feature parity, including a matrix and evidence paths."
    inputs:
      - "README and relevant docs in this repo."
      - "scripts and source files for the canary Telegram bot."
      - "/Users/jasonqwwen/projects/jarvis-telegram-gateway/README*"
      - "/Users/jasonqwwen/projects/jarvis-telegram-gateway/gateway.py"
    constraints:
      - "Read-only."
      - "Do not print or read secret token files."
      - "Do not inspect production launchd jobs, gateway config secrets, or tmux session contents."
    expected_output:
      - "Feature parity matrix."
      - "Current qwwiwi implementation evidence."
      - "Reference gateway evidence."
      - "Candidate safe first canary slice."
    receipt:
      result: done
      note: "notes/T001-parity-matrix.md"
      summary: "Mapped jarvis gateway feature surface against the qwwiwi canary bot and identified command normalization for /goat -> /goal as the safest first local slice."
      evidence:
        - "scripts/dashi-telegram-canary-bot"
        - "tests/test_dashi_telegram_canary_bot.py"
        - "docs/10-canary-telegram-smoke-bot.md"
        - "docs/07-runtime-baseline-and-canary-runbook.md"
        - "/Users/jasonqwwen/projects/jarvis-telegram-gateway/README.md"
        - "/Users/jasonqwwen/projects/jarvis-telegram-gateway/gateway.py"
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first safe implementation slice by impact, confidence, reversibility, and local testability."
    inputs:
      - "T001 receipt and notes."
      - "Current dirty diff."
    constraints:
      - "Do not implement."
      - "Reject slices that require live token consumption, production config edits, launchd changes, or tmux replacement."
    expected_output:
      - "Decision."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "The /goat -> /goal alias is explicit in the request, locally testable with fake updates, and does not require token files, Telegram live polling, tmux changes, or config edits."
      worker_objective: "Normalize inbound Telegram command text so /goat, including bot-suffixed and caption forms, reaches the Claude reply provider as /goal while preserving arguments and leaving non-command text unchanged."
      allowed_files:
        - "scripts/dashi-telegram-canary-bot"
        - "tests/test_dashi_telegram_canary_bot.py"
      verify:
        - "python3 -m unittest tests/test_dashi_telegram_canary_bot.py"
        - "git diff --check"
      stop_if:
        - "Need to read or edit token/config/launchd/tmux state."
        - "Need live Telegram token consumption."
        - "The alias requires changing Claude invocation or reply-mode semantics."
        - "Verification fails twice."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Implement the selected safe command-parity slice with TDD."
    allowed_files:
      - "scripts/dashi-telegram-canary-bot"
      - "tests/test_dashi_telegram_canary_bot.py"
    verify:
      - "python3 -m unittest tests/test_dashi_telegram_canary_bot.py"
      - "git diff --check"
    stop_if:
      - "Need to read or edit token/config/launchd/tmux state."
      - "Need live Telegram token consumption."
      - "Behavior is ambiguous after inspecting local code and reference evidence."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "scripts/dashi-telegram-canary-bot"
        - "tests/test_dashi_telegram_canary_bot.py"
      commands:
        - cmd: "python3 -m unittest tests/test_dashi_telegram_canary_bot.py"
          status: "pass"
          summary: "GREEN: 8 tests passed after inbound text normalization."
        - cmd: "git diff --check"
          status: "pass"
      summary: "Added inbound command normalization so /goat reaches the Claude reply provider as /goal before prompt construction. TDD RED was observed first: the new test failed because provider.messages[0].text was still /goat migrate parity."
  - id: T004
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Smoke-test or prepare smoke-test handoff for the /goat -> /goal canary slice without starting a second Telegram consumer."
    inputs:
      - "T003 receipt."
      - "docs/10-canary-telegram-smoke-bot.md"
      - "Current live canary tmux ownership constraints."
    constraints:
      - "Do not run a second polling process against the canary token."
      - "Do not replace or restart live tmux orgrimmar-canary without host evidence and tests."
      - "Do not read or print token values."
      - "Do not touch production token files, launchd jobs, gateway config, or production tmux sessions."
    expected_output:
      - "Either a safe smoke-test receipt or a blocked receipt naming the missing host/operator evidence."
      - "Next migration slice recommendation after smoke evidence."
    receipt:
      result: done
      summary: "Prepared live canary smoke handoff for the verified /goat alias by reloading the existing orgrimmar-canary tmux session with the same command after local tests and tmux host evidence. No second Telegram consumer was started and no token values were read or printed."
      evidence:
        - "Fresh local verification: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -> 16 tests OK."
        - "GoalBuddy checker: ok true, goal active, no warnings."
        - "Remote main: refs/heads/main at 6ceab11bfad097eacd02d2ae05d15e06d970b457."
        - "tmux list-panes confirmed the canary command before reload and after reload."
        - "tmux capture-pane showed canary status running at 2026-05-15T11:54:35.991989Z."
      next: "Operator can now send /goat ... to the test Telegram bot for live smoke. If it replies through Claude as a /goal request, proceed to the next command-router parity slice."
  - id: T005
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Capture the operator Telegram smoke result for /goat and then choose the next safe gateway parity slice."
    inputs:
      - "T004 receipt."
      - "Operator Telegram message to the test bot: /goat ..."
      - "tmux canary logs, without printing token values."
    constraints:
      - "Do not run a second polling process against the canary token."
      - "Do not read or print token values."
      - "Do not touch production token files, launchd jobs, gateway config, or production tmux sessions."
    expected_output:
      - "Telegram-visible smoke receipt for /goat -> /goal."
      - "Decision for next local implementation slice, likely /help and /status command router."
    receipt:
      result: done
      summary: "Owner requested moving directly from /goat smoke handoff into broader Jarvis gateway parity implementation. No operator Telegram smoke receipt was captured before the next implementation slice."
      next: "Broader local parity slice implemented under T006; live smoke moved to T007."
  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Implement the next canary-safe Jarvis gateway parity slice: local commands, Telegram HTML/chunk send path, reply/forward/media prompt context, optional voice transcription hook, and Claude session persistence."
    allowed_files:
      - "scripts/dashi-telegram-canary-bot"
      - "tests/test_dashi_telegram_canary_bot.py"
      - "docs/superpowers/plans/2026-05-15-canary-gateway-parity-slice.md"
    constraints:
      - "Do not expose or print token values."
      - "Do not start a second Telegram poller."
      - "Do not touch production token files, launchd jobs, gateway config, or production tmux sessions."
      - "Keep external Groq transcription optional and fail closed when no key exists."
    verify:
      - "PYTHONDONTWRITEBYTECODE=1 python3 -m unittest tests.test_dashi_telegram_canary_bot -v"
      - "PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests"
    receipt:
      result: done
      changed_files:
        - "scripts/dashi-telegram-canary-bot"
        - "tests/test_dashi_telegram_canary_bot.py"
        - "docs/superpowers/plans/2026-05-15-canary-gateway-parity-slice.md"
      commands:
        - cmd: "PYTHONDONTWRITEBYTECODE=1 python3 -m unittest tests.test_dashi_telegram_canary_bot -v"
          status: "pass"
          summary: "15 canary bot tests passed after RED failures for missing gateway parity behavior."
        - cmd: "PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests"
          status: "pass"
          summary: "23 tests passed."
      summary: "Added canary-safe local command router for /help, /status, /reset force, /new force, /compact, /stop; Telegram HTML formatting, chunking, reply-to, and parse fallback; prompt context for forwards, replies, photos, documents/videos/stickers/voice descriptors; optional Groq-compatible voice transcription hook; per-chat Claude --session-id then --resume persistence."
      remaining:
        - "Inline callback handlers are not live-enabled yet."
        - "sendDocument for produced files is not implemented yet."
        - "Webhook injection endpoint is not implemented yet."
        - "Group allowlist, mention routing, topic routing, OpenViking/L4 memory hooks, and hot/warm compaction remain future slices."
  - id: T007
    type: pm
    assignee: PM
    status: active
    reasoning_hint: default
    objective: "Reload the existing canary tmux consumer after verification and capture live Telegram smoke for the expanded gateway parity slice."
    inputs:
      - "T006 receipt."
      - "Updated scripts/dashi-telegram-canary-bot."
      - "Existing orgrimmar-canary tmux session."
    constraints:
      - "Do not start a second poller against the canary token."
      - "Do not read or print token values."
      - "Do not touch production token files, launchd jobs, gateway config, or production tmux sessions."
    expected_output:
      - "Canary tmux is running updated code."
      - "Operator can smoke /help, /status, /goat, /reset force, text, image, and voice in Telegram."
      - "Next worker slice chosen for remaining parity gaps."
    receipt: null
  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Audit whether the current tranche is complete and whether the full original gateway parity outcome remains active."
    inputs:
      - "All done task receipts."
      - "Last verification."
      - "Current dirty diff."
    constraints:
      - "Do not implement."
      - "Reject full completion if only one parity slice is implemented."
      - "Reject completion if smoke-test or migration follow-up remains required."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt: null

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T006
    commands:
      - "PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests"
